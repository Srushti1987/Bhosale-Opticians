<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cart - SUNRAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <h2>Cart Debugger</h2>
        
        <div class="card mb-3">
            <div class="card-body">
                <h5>Add Test Product to Cart</h5>
                <button class="btn btn-primary" onclick="addTestProduct()">Add Test Product</button>
                <button class="btn btn-danger" onclick="clearCart()">Clear Cart</button>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5>Current Cart Contents:</h5>
                <pre id="cartDisplay" class="bg-light p-3"></pre>
            </div>
        </div>
    </div>

    <script>
        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cartDisplay').textContent = JSON.stringify(cart, null, 2);
        }

        function addTestProduct() {
            const product = {
                id: '1',
                name: 'Test Sunglasses',
                price: '₹2,999.00',
                image: 'https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400',
                quantity: 1
            };

            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push(product);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
            alert('Test product added!');
        }

        function clearCart() {
            localStorage.removeItem('cart');
            displayCart();
            alert('Cart cleared!');
        }

        // Display cart on load
        displayCart();
    </script>
</body>
</html>
